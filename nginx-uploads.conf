# Paste this block inside your existing server { } block in Nginx.
# It serves /uploads/* directly from disk — bypasses Node.js entirely.

location /uploads/ {
    alias /home/christian/uploads/;

    # Allow large files
    client_max_body_size 20M;

    # Cache images for 7 days
    add_header Cache-Control "public, max-age=604800, immutable";

    # Security: no directory listing, block PHP execution
    autoindex off;
    location ~* \.php$ { deny all; }

    # CORS for frontend domain (adjust if needed)
    add_header Access-Control-Allow-Origin *;
}
